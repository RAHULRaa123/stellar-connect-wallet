name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm run build

  smart-contract:
    name: Smart Contract CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify smart contract files
        run: |
          echo "Checking smart contract integration..."
          ls
          echo "Smart contract CI completed"
